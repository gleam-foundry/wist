<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wist Dice Duel Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #090514 0%, #030107 100%);
      --card-bg: rgba(28, 20, 52, 0.45);
      --card-border: rgba(138, 75, 240, 0.2);
      --accent-color: #9d4edd;
      --accent-glow: rgba(157, 78, 221, 0.4);
      --text-main: #f3f0fc;
      --text-muted: #988fb3;
      --status-connecting: #e0a96d;
      --status-connected: #00f5d4;
      --status-disconnected: #ff5e7e;
      --font-family: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #c77dff, #00f5d4, #ff5e7e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.05em;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .container {
      max-width: 950px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @media (min-width: 768px) {
      .container {
        grid-template-columns: 320px 1fr;
      }
    }

    .panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 1.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
    }

    .status-card {
      align-items: center;
      text-align: center;
      gap: 1rem;
    }

    .status-indicator {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.5s ease;
      box-shadow: 0 0 25px var(--glow-color);
      border: 3px solid var(--border-color);
    }

    .status-connecting {
      --glow-color: rgba(224, 169, 109, 0.3);
      --border-color: var(--status-connecting);
      background: rgba(224, 169, 109, 0.1);
      color: var(--status-connecting);
      animation: pulse 1.5s infinite alternate;
    }

    .status-connected {
      --glow-color: rgba(0, 245, 212, 0.3);
      --border-color: var(--status-connected);
      background: rgba(0, 245, 212, 0.1);
      color: var(--status-connected);
    }

    .status-disconnected {
      --glow-color: rgba(255, 94, 126, 0.3);
      --border-color: var(--status-disconnected);
      background: rgba(255, 94, 126, 0.1);
      color: var(--status-disconnected);
    }

    .metadata {
      width: 100%;
      text-align: left;
      margin-top: 0.5rem;
    }

    .metadata h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
    }

    .meta-item {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 10px;
      padding: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      word-break: break-all;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .game-panel {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .scoreboard {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(0,0,0,0.2);
      border-radius: 18px;
      padding: 1rem;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .score-box {
      text-align: center;
    }

    .score-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .score-value {
      font-size: 2.5rem;
      font-weight: 800;
      font-family: var(--font-mono);
    }

    .player-score {
      color: var(--status-connected);
      text-shadow: 0 0 15px rgba(0, 245, 212, 0.3);
    }

    .server-score {
      color: var(--status-disconnected);
      text-shadow: 0 0 15px rgba(255, 94, 126, 0.3);
    }

    .score-divider {
      font-size: 1.5rem;
      color: rgba(255,255,255,0.1);
      font-weight: 300;
    }

    .arena {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      border-radius: 18px;
      background: rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.02);
      gap: 1rem;
    }

    .dice-area {
      display: flex;
      gap: 3rem;
      justify-content: center;
      align-items: center;
    }

    .dice-wrapper {
      text-align: center;
    }

    .dice-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .dice {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--text-main);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dice.rolling {
      animation: spin 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .arena-banner {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-main);
      height: 2rem;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .log-container {
      flex-grow: 1;
      height: 180px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 14px;
      padding: 1rem;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .log-entry {
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      animation: slideIn 0.3s ease;
      line-height: 1.4;
    }

    .log-system {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      border-left: 3px solid var(--text-muted);
    }

    .log-roll {
      background: rgba(157, 78, 221, 0.1);
      border-left: 3px solid var(--accent-color);
    }

    .log-win {
      background: rgba(0, 245, 212, 0.08);
      color: #00f5d4;
    }

    .log-lose {
      background: rgba(255, 94, 126, 0.08);
      color: #ff5e7e;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
    }

    button {
      flex-grow: 1;
      background: linear-gradient(135deg, var(--accent-color) 0%, #7b2cbf 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.9rem 1.5rem;
      font-family: var(--font-family);
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(157, 78, 221, 0.5);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    button.btn-danger {
      background: linear-gradient(135deg, #ff5e7e 0%, #d90429 100%);
      box-shadow: 0 4px 15px rgba(255, 94, 126, 0.3);
    }

    button.btn-danger:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(255, 94, 126, 0.5);
    }

    button.btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-main);
      box-shadow: none;
    }

    button.btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      from { box-shadow: 0 0 10px var(--glow-color); }
      to { box-shadow: 0 0 25px var(--glow-color); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg) scale(1); }
      30% { transform: rotate(180deg) scale(1.15); }
      70% { transform: rotate(540deg) scale(0.9); }
      100% { transform: rotate(720deg) scale(1); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Wist Dice Duel</h1>
    <div class="subtitle">Full-duplex state machine verification app</div>
  </header>

  <div class="container">
    <div class="panel status-card">
      <div id="statusIndicator" class="status-indicator status-disconnected">
        Offline
      </div>
      <div class="metadata">
        <h3>WS Endpoint</h3>
        <div class="meta-item" id="wsEndpointLabel">ws://0.0.0.0:9987/ws</div>
      </div>
      <div class="metadata">
        <h3>WS Context</h3>
        <div id="contextInfo" class="meta-item" style="line-height: 1.4;">
          Query: None<br>Path: None
        </div>
      </div>
      <button id="connectBtn" style="width: 100%; margin-top: 1rem;">Connect</button>
      <button id="closeBtn" class="btn-danger" style="width: 100%; margin-top: 0.5rem; display: none;">
        Disconnect
      </button>
    </div>

    <div class="panel game-panel">
      <div class="scoreboard">
        <div class="score-box">
          <div class="score-label">You</div>
          <div id="playerScore" class="score-value player-score">0</div>
        </div>
        <div class="score-divider">VS</div>
        <div class="score-box">
          <div class="score-label">Server</div>
          <div id="serverScore" class="score-value server-score">0</div>
        </div>
      </div>

      <div class="arena">
        <div class="dice-area">
          <div class="dice-wrapper">
            <div class="dice-title">You</div>
            <div id="playerDice" class="dice">⚀</div>
          </div>
          <div class="dice-wrapper">
            <div class="dice-title">Server</div>
            <div id="serverDice" class="dice">⚀</div>
          </div>
        </div>
        <div id="arenaBanner" class="arena-banner">Connect to begin the duel</div>
      </div>

      <div id="logContainer" class="log-container">
        <div class="log-entry log-system">
          Click "Connect" to upgrade HTTP and initialize state.
        </div>
      </div>

      <div class="controls">
        <button id="resetBtn" class="btn-secondary" disabled>Reset Score</button>
        <button id="rollBtn" disabled>Roll Dice</button>
      </div>
    </div>
  </div>

  <script>
    const statusIndicator = document.getElementById('statusIndicator');
    const connectBtn = document.getElementById('connectBtn');
    const closeBtn = document.getElementById('closeBtn');
    const rollBtn = document.getElementById('rollBtn');
    const resetBtn = document.getElementById('resetBtn');
    const logContainer = document.getElementById('logContainer');
    const contextInfo = document.getElementById('contextInfo');
    const playerScore = document.getElementById('playerScore');
    const serverScore = document.getElementById('serverScore');
    const playerDice = document.getElementById('playerDice');
    const serverDice = document.getElementById('serverDice');
    const arenaBanner = document.getElementById('arenaBanner');

    const diceFaces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

    let socket = null;

    function appendLog(type, text) {
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function setStatus(status) {
      statusIndicator.className = `status-indicator status-${status}`;
      statusIndicator.textContent = status;

      if (status === 'connected') {
        connectBtn.style.display = 'none';
        closeBtn.style.display = 'block';
        rollBtn.disabled = false;
        resetBtn.disabled = false;
      } else if (status === 'disconnected') {
        connectBtn.style.display = 'block';
        closeBtn.style.display = 'none';
        rollBtn.disabled = true;
        resetBtn.disabled = true;
        arenaBanner.textContent = "Disconnected";
      } else if (status === 'connecting') {
        connectBtn.disabled = true;
        connectBtn.textContent = 'Connecting...';
      }
    }

    document.getElementById('wsEndpointLabel').textContent = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/ws`;

    connectBtn.addEventListener('click', () => {
      setStatus('connecting');
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProtocol}//${window.location.host}/ws?duel=active`;
      appendLog('system', `Upgrading protocol. Connecting to ${wsUrl}...`);
      
      socket = new WebSocket(wsUrl);

      socket.onopen = () => {
        setStatus('connected');
        connectBtn.disabled = false;
        connectBtn.textContent = 'Connect';
        appendLog('system', 'Wist handshake successful. Game state constructed.');
        contextInfo.innerHTML = `Query: duel=active<br>Path: /ws<br>Protocol: Wist Custom Codec`;
        arenaBanner.textContent = "Ready to Duel!";
      };

      socket.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload.type === 'welcome') {
            appendLog('system', 'Game initialized. Scoreboard: 0-0.');
            playerScore.textContent = '0';
            serverScore.textContent = '0';
            playerDice.textContent = '⚀';
            serverDice.textContent = '⚀';
          } else if (payload.type === 'update') {
            playerDice.classList.remove('rolling');
            serverDice.classList.remove('rolling');
            
            // Force redraw/retrigger animation
            void playerDice.offsetWidth;
            
            playerDice.textContent = diceFaces[payload.player_roll - 1];
            serverDice.textContent = diceFaces[payload.server_roll - 1];
            playerScore.textContent = payload.player_score;
            serverScore.textContent = payload.server_score;
            
            arenaBanner.textContent = payload.result;
            
            let logType = 'roll';
            if (payload.result.includes('win')) logType = 'win';
            if (payload.result.includes('wins!')) logType = 'lose';
            
            appendLog(logType, `You rolled ${payload.player_roll}, Server rolled ${payload.server_roll}. ${payload.result}`);
          }
        } catch (e) {
          appendLog('system', `Error parsing codec output: ${event.data}`);
        }
      };

      socket.onclose = (event) => {
        setStatus('disconnected');
        appendLog('system', `Socket closed. Code: ${event.code}, Clean: ${event.wasClean}`);
        socket = null;
      };

      socket.onerror = () => {
        appendLog('system', 'Handshake or protocol socket failure.');
      };
    });

    closeBtn.addEventListener('click', () => {
      if (socket) {
        socket.close();
      }
    });

    rollBtn.addEventListener('click', () => {
      if (socket) {
        playerDice.classList.add('rolling');
        serverDice.classList.add('rolling');
        socket.send('roll');
      }
    });

    resetBtn.addEventListener('click', () => {
      if (socket) {
        socket.send('reset');
      }
    });
  </script>
</body>
</html>
